# =============================================
# Pixels Spark Local Configuration
# =============================================
# This file controls local CDC/import behavior for Delta/Hudi benchmarks.
# Override any key via environment variables in scripts when needed.

# Number of source buckets. If pixels.buckets is not specified explicitly,
# source readers may fall back to [0, node.bucket.num).
# Optional: any positive integer, e.g. 16 / 64 / 256.
node.bucket.num=256

# Root directory for temporary local files.
# Optional: absolute path.
pixels.tmp.root=/home/ubuntu/disk1/tmp

# =============================================
# Spark + Pixels Source Connectivity
# =============================================

# Pixels RPC host.
# Optional: IP or DNS name.
pixels.spark.rpc.host=127.0.0.1

# Pixels RPC port.
# Optional: valid TCP port.
pixels.spark.rpc.port=9091

# Metadata service host.
# Optional: IP or DNS name.
pixels.spark.metadata.host=127.0.0.1

# Metadata service port.
# Optional: valid TCP port.
pixels.spark.metadata.port=18888

# Spark master.
# Optional: local[N], spark://..., yarn, k8s.
pixels.spark.master=local[16]

# Max source rows pulled per polling round for one bucket/reader.
# Optional: positive integer.
pixels.spark.source.max-rows-per-batch=10000

# Max waiting time (ms) for one source batch.
# Optional: non-negative integer.
pixels.spark.source.max-wait-ms-per-batch=10000

# When true, receiving non-empty poll extends max wait window.
# Optional: true | false.
pixels.spark.source.refresh-max-wait-on-non-empty-poll=true

# Sleep interval (ms) after empty poll.
# Optional: non-negative integer.
pixels.spark.source.empty-poll-sleep-ms=1000

# Spark driver memory for CDC jobs.
# Optional: Spark memory format, e.g. 4g / 16g / 32768m.
pixels.spark.driver.memory=32g

# Spark shuffle partitions.
# Optional: positive integer.
pixels.spark.shuffle.partitions=16

# Spark default parallelism.
# Optional: positive integer.
pixels.spark.default.parallelism=16

# Max bytes per file partition when reading files.
# Optional: positive integer bytes.
pixels.spark.sql.files.max-partition-bytes=268435456

# Enable Spark streaming metrics.
# Optional: true | false.
pixels.spark.streaming.metrics.enabled=true

# Spark event log directory.
# Optional: absolute path.
pixels.spark.event-log.dir=/home/ubuntu/disk1/tmp/spark-events

# Spark local dir for shuffle/tmp data.
# Optional: absolute path.
pixels.spark.local.dir=/home/ubuntu/disk1/tmp/spark-local

# S3A buffering local directory.
# Optional: absolute path.
pixels.spark.s3a.buffer.dir=/home/ubuntu/disk1/tmp/s3a-buffer

# =============================================
# CDC Sink Behavior (Delta/Hudi/Noop)
# =============================================

# Base target path used by CDC scripts.
# Optional: s3a://... or local path.
pixels.spark.delta.target.path=s3a://home-zinuo/deltalake/hybench_sf10

# CDC execution mode.
# Optional: polling | streaming.
pixels.spark.cdc.execution.mode=polling
# pixels.spark.cdc.execution.mode=streaming
# Deprecated (kept for migration fallback):
# pixels.spark.delta.mode=polling

# Unified sink mode for CDC merge.
# Optional: delta | hudi | noop.
# pixels.spark.sink.mode=delta
pixels.spark.sink.mode=hudi

# Bucket ranges that should force noop sink even when sink.mode is delta/hudi.
# Optional: "", single id (e.g. 3), range (e.g. 0-7), CSV mix (e.g. 0-3,8,10-12).
pixels.spark.delta.noop-buckets=

# Max in-memory pending batches for polling mode queue.
# Optional: positive integer.
pixels.spark.delta.max-pending-batches=16

# Keep only latest record per primary key in one micro-batch/polling batch.
# Optional: true | false.
pixels.spark.delta.enable-latest-per-primary-key=true

# Auto-create target table if not exists.
# Optional: true | false.
pixels.spark.delta.auto-create=true

# Delete handling strategy.
# Optional: hard | soft | ignore.
pixels.spark.delta.delete.mode=hard

# Streaming trigger mode.
# Optional: processing-time | once | available-now.
pixels.spark.delta.trigger.mode=processing-time

# Trigger interval when trigger.mode=processing-time.
# Optional examples: "5 seconds", "1 minute".
pixels.spark.delta.trigger.interval=10 seconds

# Delta deletion vectors toggle.
# Optional: true | false.
pixels.spark.delta.enable-deletion-vectors=true

# =============================================
# Import Engine Behavior
# =============================================

# CSV chunk rows for import scripts.
# Optional: positive integer.
pixels.spark.import.csv.chunk-rows=5120000

# Whether import scripts count rows after write.
# Optional: true | false.
pixels.spark.import.count-rows=false

# Import sink mode.
# Optional: delta | hudi.
pixels.spark.import.mode=delta

# Default benchmark for import app.
# Optional: hybench | chbenchmark.
pixels.import.benchmark=hybench

# =============================================
# Generic CDC Defaults
# =============================================

# Default benchmark for CDC app.
# Optional: hybench | chbenchmark.
pixels.cdc.benchmark=chbenchmark

# Source database name.
# Optional: any schema/database string.
pixels.cdc.database=pixels_bench

# Default CDC tables (CSV list).
# Optional: comma-separated table names.
pixels.cdc.tables=customer,company,savingaccount,checkingaccount,transfer,checking,loanapps,loantrans

# PID/State directory for CDC scripts.
# Optional: absolute path.
pixels.cdc.state-dir=/home/ubuntu/disk1/tmp/hybench_sf10_cdc_state

# Log directory for CDC scripts.
# Optional: absolute path.
pixels.cdc.log-dir=/home/ubuntu/disk1/tmp/hybench_sf10_cdc_logs

# Checkpoint root for structured streaming CDC.
# Optional: absolute path.
pixels.cdc.checkpoint-root=/home/ubuntu/disk1/tmp/hybench_sf10_cdc_ckpt

# Metrics output directory for CDC collection scripts.
# Optional: absolute path.
pixels.cdc.metrics-dir=/home/ubuntu/disk1/tmp/hybench_sf10_cdc_metrics

# Resource metrics input directory.
# Optional: absolute path.
pixels.cdc.resource-dir=/home/ubuntu/disk1/projects/pixels-spark/data/hybench/sf10/resource

# Resource metrics input filename.
# Optional: filename only.
pixels.cdc.resource-file=resource_delta.csv

# Network interface for metrics collection.
# Optional: auto | specific interface name (e.g. ens5 / eth0).
pixels.cdc.network-interface=ens5

# Disk device for metrics collection.
# Optional: auto | device name (e.g. nvme0n1 / sda).
pixels.cdc.disk-device=auto

# =============================================
# Generic Import Defaults
# =============================================

# Default import tables for hybench.
# Optional: comma-separated table names.
pixels.import.tables=customer,company,savingaccount,checkingaccount,transfer,checking,loanapps,loantrans

# Default import tables for chbenchmark.
# Optional: comma-separated table names.
pixels.import.chbenchmark.tables=warehouse,district,customer,history,neworder,order,orderline,item,stock,nation,supplier,region

# Driver memory for import jobs.
# Optional: Spark memory format.
pixels.import.spark.driver.memory=96g

# Shuffle partitions for import jobs.
# Optional: positive integer.
pixels.import.spark.shuffle.partitions=32

# Default parallelism for import jobs.
# Optional: positive integer.
pixels.import.spark.default.parallelism=32

# Max partition bytes for import jobs.
# Optional: positive integer bytes.
pixels.import.spark.sql.files.max-partition-bytes=268435456

# Local root for temporary delta outputs during import.
# Optional: absolute path.
pixels.import.local.delta-root=/home/ubuntu/disk1/tmp/pixels-benchmark-deltalake/data_1x

# Temporary directory for chunked CSV files.
# Optional: absolute path.
pixels.import.chunk-temp-dir=/home/ubuntu/disk1/tmp/pixels-chunks

