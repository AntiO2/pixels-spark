# pixels-spark specific defaults.
# Copy this file to $PIXELS_HOME/etc/pixels-spark.properties and adjust values there.

pixels.tmp.root=/home/ubuntu/disk1/tmp
pixels.spark.rpc.host=localhost
pixels.spark.rpc.port=9091
pixels.spark.metadata.host=localhost
pixels.spark.metadata.port=18888
pixels.spark.source.max-rows-per-batch=10000
pixels.spark.source.max-wait-ms-per-batch=1000
pixels.spark.source.refresh-max-wait-on-non-empty-poll=false
pixels.spark.source.empty-poll-sleep-ms=100
pixels.spark.delta.mode=polling
pixels.spark.delta.sink-mode=delta
pixels.spark.delta.noop-buckets=
pixels.spark.delta.max-pending-batches=8
pixels.spark.delta.enable-latest-per-primary-key=false
pixels.spark.event-log.dir=/home/ubuntu/disk1/tmp/spark-events
pixels.spark.local.dir=/home/ubuntu/disk1/tmp/pixels-spark-local
pixels.spark.s3a.buffer.dir=/home/ubuntu/disk1/tmp/pixels-s3a-buffer
pixels.import.local.delta-root=/home/ubuntu/disk1/tmp/pixels-benchmark-deltalake/data_1x
pixels.import.chunk-temp-dir=/home/ubuntu/disk1/tmp/pixels-chunks
pixels.trino.readtest.root=/home/ubuntu/disk1/tmp/trino-readtest
pixels.cdc.resource-dir=/home/ubuntu/disk1/projects/pixels-spark/data/hybench/sf10/resource
pixels.cdc.resource-file=resource_cdc.csv
pixels.cdc.network-interface=auto
pixels.cdc.disk-device=auto
pixels.spark.delta.auto-create=true
pixels.spark.delta.delete.mode=hard
pixels.spark.delta.trigger.mode=once
pixels.spark.delta.trigger.interval=0 seconds
pixels.spark.delta.enable-deletion-vectors=true
pixels.spark.import.csv.chunk-rows=25600000
pixels.spark.import.count-rows=false
pixels.import.benchmark=hybench
pixels.cdc.benchmark=hybench
pixels.import.chbenchmark.tables=warehouse,district,customer,history,neworder,order,orderline,item,stock,nation,supplier,region
pixels.import.chbenchmark.w1.csv-root=/home/ubuntu/disk1/ch_w1
pixels.import.chbenchmark.w1.target-root=s3a://home-zinuo/deltalake/chbenchmark_w1
